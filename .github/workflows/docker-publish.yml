name: Build and Publish Docker Images

# Build Strategy:
# - Push to main/develop: Build only (test CI/CD, no publish) - saves GHCR resources
# - Version tags (v*.*.*): Build and publish as 'latest' + semver tags (e.g., 0.1.2, 0.1)
# - Nightly schedule: Build and publish 'dev' + SHA tags from develop branch
# - Manual dispatch: Build and publish 'dev' + SHA tags based on selected branch

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'  # Only build on version tags
  schedule:
    - cron: '0 0 * * *'  # Nightly dev build at midnight UTC
  workflow_dispatch:
    inputs:
      build_branch:
        description: 'Branch to build (develop or main)'
        required: false
        default: 'develop'
        type: choice
        options:
          - develop
          - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.build_branch || (github.event_name == 'schedule' && 'develop') || github.ref }}
          fetch-depth: 0  # Fetch all history including tags

      # Skip this job if triggered by a branch push AND the commit has a version tag
      # This prevents duplicate builds when release.sh pushes both the commit and tag
      - name: Check if commit is tagged
        id: check_tag
        run: |
          # Only check for tags on push events to branches (not manual/schedule/tag triggers)
          if [[ "${{ github.event_name }}" == "push" && ! "${{ github.ref }}" =~ ^refs/tags/ ]]; then
            if git describe --exact-match --tags HEAD 2>/dev/null | grep -q '^v[0-9]'; then
              echo "is_tagged=true" >> $GITHUB_OUTPUT
              echo "⏭️ This commit has a version tag - skipping branch build to avoid duplicate"
            else
              echo "is_tagged=false" >> $GITHUB_OUTPUT
            fi
          else
            # For manual/schedule/tag triggers, always proceed
            echo "is_tagged=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check_tag.outputs.is_tagged != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_tag.outputs.is_tagged != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.check_tag.outputs.is_tagged != 'true' && (github.event_name != 'push' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        if: steps.check_tag.outputs.is_tagged != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag 'latest' only for version releases (v*.*.*)
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Tag 'dev' only for develop branch (nightly builds and manual dispatch)
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' || github.event.inputs.build_branch == 'develop' }}
            # Tag with semver for version tags (v1.0.0 -> 1.0.0, 0.1)
            # Note: {{major}} tag disabled until v1.0.0+ to avoid confusing '0' tag during pre-release
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Tag with SHA only for develop branch (nightly builds and manual develop dispatch)
            # Never enabled for main branch or version tag releases
            type=sha,enable=${{ github.ref == 'refs/heads/develop' || github.event.inputs.build_branch == 'develop' }}
          flavor: |
            latest=false

      - name: Build and push Docker image
        if: steps.check_tag.outputs.is_tagged != 'true'
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Only push for: version tags, nightly builds, or manual dispatch (not branch pushes)
          push: ${{ github.event_name != 'push' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Generate artifact attestation
        if: steps.check_tag.outputs.is_tagged != 'true' && (github.event_name != 'push' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
