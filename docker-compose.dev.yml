# Docker Compose for Development Testing

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: deduparr-backend-dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - ./config:/config
      - ./data:/app/data  # Persistent encryption key storage
    environment:
      - DATABASE_TYPE=sqlite
      - DATABASE_URL=sqlite:////config/deduparr.db
      - ENABLE_SCHEDULED_SCANS=yes
      - SCAN_INTERVAL_HOURS=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: deduparr-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: deduparr-dev
